<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" width="320" height="400">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF6E;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#F0D080;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8843C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Oval circle -->
  <ellipse cx="160" cy="170" rx="110" ry="130" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- AM monogram -->
  <text x="160" y="200"
    font-family="Cormorant Garamond, Georgia, serif"
    font-size="96"
    font-weight="600"
    fill="url(#gold)"
    text-anchor="middle"
    letter-spacing="-4">AM</text>
  <!-- Mentoria Ayumi -->
  <text x="160" y="340"
    font-family="Cormorant Garamond, Georgia, serif"
    font-size="26"
    font-weight="400"
    fill="url(#gold)"
    text-anchor="middle"
    letter-spacing="3">Mentoria Ayumi</text>
</svg>
